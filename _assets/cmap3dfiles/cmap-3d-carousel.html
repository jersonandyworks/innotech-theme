<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CMAP 3D Carousel</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #121821;
    --accent: #4ad6ff;
    --text: #e6edf3;
    --muted: #8aa0b4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 16px; }
  h1 { margin: 0 0 8px; font-size: 24px; }
  .sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; }

  .carousel { position: relative; overflow: hidden; border-radius: 14px; background: var(--panel); box-shadow: 0 10px 40px rgba(0,0,0,.4); }
  .track { display: flex; transition: transform .5s cubic-bezier(.65,.05,.36,1); will-change: transform; }
  .slide { flex: 0 0 100%; position: relative; aspect-ratio: 16/10; min-height: 420px; }
  .slide canvas { display: block; width: 100% !important; height: 100% !important; outline: none; cursor: grab; }
  .slide canvas:active { cursor: grabbing; }

  .label { position: absolute; left: 16px; bottom: 14px; padding: 6px 12px; background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.08); border-radius: 999px; font-size: 13px; letter-spacing: .3px; backdrop-filter: blur(6px); }
  .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; pointer-events: none; background: radial-gradient(circle at center, rgba(74,214,255,.06), transparent 60%); }
  .loading.hide { display: none; }

  .nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,.5); color: var(--text); border: 1px solid rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .2s, transform .2s; z-index: 5; }
  .nav:hover { background: rgba(74,214,255,.2); transform: translateY(-50%) scale(1.05); }
  .nav.prev { left: 14px; }
  .nav.next { right: 14px; }
  .nav svg { width: 18px; height: 18px; }

  .dots { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #2a3340; border: 0; cursor: pointer; transition: background .2s, transform .2s; padding: 0; }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  .hint { text-align: center; margin-top: 14px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CMAP 3D Model Carousel</h1>
  <p class="sub">Drag to rotate. Scroll to zoom. Right-click drag to pan.</p>

  <div class="carousel" id="carousel">
    <div class="track" id="track">
      <div class="slide" data-model="cmap_box.glb" data-label="CMAP Box">
        <canvas></canvas>
        <div class="label">CMAP Box</div>
        <div class="loading">Loading…</div>
      </div>
      <div class="slide" data-model="cmap_sensor1.glb" data-label="CMAP Sensor 1">
        <canvas></canvas>
        <div class="label">CMAP Sensor 1</div>
        <div class="loading">Loading…</div>
      </div>
      <div class="slide" data-model="cmap_sensor2.glb" data-label="CMAP Sensor 2">
        <canvas></canvas>
        <div class="label">CMAP Sensor 2</div>
        <div class="loading">Loading…</div>
      </div>
      <div class="slide" data-model="sense.glb" data-label="Sense">
        <canvas></canvas>
        <div class="label">Sense</div>
        <div class="loading">Loading…</div>
      </div>
    </div>

    <button class="nav prev" id="prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav next" id="next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="dots" id="dots"></div>
  <p class="hint">Use arrow keys or the buttons to switch models.</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const slides = [...document.querySelectorAll('.slide')];
const track = document.getElementById('track');
const dotsWrap = document.getElementById('dots');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let activeIdx = 0;
const viewers = new Map();

slides.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
  dot.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(dot);
});

function goTo(i) {
  activeIdx = (i + slides.length) % slides.length;
  track.style.transform = `translateX(-${activeIdx * 100}%)`;
  [...dotsWrap.children].forEach((d, k) => d.classList.toggle('active', k === activeIdx));
  ensureViewer(activeIdx);
}

prevBtn.addEventListener('click', () => goTo(activeIdx - 1));
nextBtn.addEventListener('click', () => goTo(activeIdx + 1));
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goTo(activeIdx - 1);
  if (e.key === 'ArrowRight') goTo(activeIdx + 1);
});

function createViewer(slideEl) {
  const canvas = slideEl.querySelector('canvas');
  const loadingEl = slideEl.querySelector('.loading');
  const modelPath = slideEl.dataset.model;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.8;

  const scene = new THREE.Scene();
  scene.background = null;

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
  camera.position.set(2, 1.5, 3);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));

  // Strong top light
  const top = new THREE.DirectionalLight(0xffffff, 3.0);
  top.position.set(0, 10, 0);
  scene.add(top);

  // Key + fill + rim
  const key = new THREE.DirectionalLight(0xffffff, 2.5);
  key.position.set(5, 8, 6);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xbfd6ff, 0.8);
  fill.position.set(-4, 2, -3);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0xffffff, 0.6);
  rim.position.set(0, 3, -8);
  scene.add(rim);

  // Hemisphere = soft sky/ground bounce
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 0.6));

  // Soft bottom uplight (broad, low intensity, no harsh shadows)
  const bottomA = new THREE.DirectionalLight(0xffffff, 1.2);
  bottomA.position.set(0, -10, 0);
  scene.add(bottomA);

  const bottomB = new THREE.DirectionalLight(0xffe6cc, 0.5);
  bottomB.position.set(4, -6, 4);
  scene.add(bottomB);

  const bottomC = new THREE.DirectionalLight(0xccddff, 0.5);
  bottomC.position.set(-4, -6, -4);
  scene.add(bottomC);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = true;
  controls.minDistance = 0.1;
  controls.maxDistance = 100;

  function resize() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    if (!w || !h) return;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  const ro = new ResizeObserver(resize);
  ro.observe(canvas);
  resize();

  const viewer = { renderer, scene, camera, controls, active: false, loaded: false };

  function animate() {
    if (!viewer.disposed) requestAnimationFrame(animate);
    if (!viewer.active) return;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  const loader = new GLTFLoader();
  loader.load(
    modelPath,
    (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3()).length();
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);

      const dist = size * 1.2;
      camera.near = size / 100;
      camera.far = size * 100;
      camera.updateProjectionMatrix();
      camera.position.set(dist * 0.6, dist * 0.4, dist);
      controls.target.set(0, 0, 0);
      controls.minDistance = size * 0.2;
      controls.maxDistance = size * 5;
      controls.update();

      scene.add(model);
      viewer.loaded = true;
      loadingEl.classList.add('hide');
    },
    (xhr) => {
      if (xhr.total) {
        const pct = ((xhr.loaded / xhr.total) * 100).toFixed(0);
        loadingEl.textContent = `Loading… ${pct}%`;
      }
    },
    (err) => {
      console.error('GLB load failed:', modelPath, err);
      loadingEl.textContent = 'Failed to load model';
    }
  );

  return viewer;
}

function ensureViewer(i) {
  viewers.forEach((v) => (v.active = false));
  let v = viewers.get(i);
  if (!v) {
    v = createViewer(slides[i]);
    viewers.set(i, v);
  }
  v.active = true;
}

ensureViewer(0);

let touchStartX = null;
track.parentElement.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
track.parentElement.addEventListener('touchend', (e) => {
  if (touchStartX == null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) goTo(activeIdx + (dx < 0 ? 1 : -1));
  touchStartX = null;
});
</script>
</body>
</html>
